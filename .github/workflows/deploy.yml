name: Build, Scan, and Deploy

on:
  push:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Run unit tests
        run: |
          pip install pytest
          pytest

      - name: Lint
        run: make lint

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  security-scan:
    name: Security Scan (Trivy)
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1   # Fail pipeline on CRITICAL vulnerabilities

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  sign-image:
    name: Sign Image (Cosign keyless)
    needs: security-scan
    runs-on: ubuntu-latest
    permissions:
      id-token: write    # Required for OIDC keyless signing
      packages: write
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image with OIDC identity
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-test.outputs.image-digest }}

      - name: Attach SBOM attestation
        run: |
          cosign attest --yes \
            --predicate sbom.json \
            --type spdx \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-test.outputs.image-digest }}

  deploy-staging:
    name: Deploy to Staging
    needs: sign-image
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_PAT }}

      - name: Update staging image tag via Kustomize
        run: |
          cd gitops/staging
          kustomize edit set image \
            app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "deploy(staging): ${{ github.sha }}"
          git push

  integration-tests:
    name: Integration Tests (Staging)
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for ArgoCD sync
        run: |
          argocd app wait my-api-staging \
            --sync \
            --health \
            --timeout 300

      - name: Run integration tests against staging
        run: make integration-test ENVIRONMENT=staging

  deploy-production:
    name: Deploy to Production (Canary)
    needs: integration-tests
    runs-on: ubuntu-latest
    environment: production   # Requires manual approval in GitHub
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_PAT }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify image signature before production deploy
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/deploy.yml" \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Update production image tag (triggers Flagger canary)
        run: |
          cd gitops/production
          kustomize edit set image \
            app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "deploy(production): ${{ github.sha }}"
          git push

      - name: Monitor Flagger canary progress
        run: |
          echo "Flagger canary analysis started. Monitoring..."
          flagger --namespace=production get canary my-api --watch
